<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.png" type="image/png">
    <title>L3Y Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="titlebar">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <span id="titlebar-label">guest@L3Y Terminal — ~</span>
    </div>

    <div id="terminal"></div>

    <div id="input-row">
    <div id="prompt">
        <span class="u-name">guest</span><span class="u-at">@</span><span class="u-host">L3Y</span><span class="u-sep">:~ </span><span class="u-hash">#</span>
    </div>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" aria-label="terminal input" autofocus />
    </div>

    <div id="toast"></div>
    
    <script src="script.js">
    </script>
</body>
</html>
